[ пАД ](bg:#f5a9d0 fg:#2d1424)\
$hostname\
[оВЉ](bg:#e85ba8 fg:#f5a9d0)\
$directory\
[оВЉ](fg:#e85ba8 bg:#5c2347)\
$git_branch$git_status\
[оВЉ](fg:#5c2347 bg:#3d1830)\
$nodejs$rust$golang$php$python\
[оВЉ](fg:#3d1830 bg:#2d1424)\
