[directory]
style = "fg:#2d1424 bg:#e85ba8"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "пА≠ "
"Downloads" = "пАЩ "

[git_branch]
symbol = "оВ†"
format = '[ $symbol $branch ](fg:#6cb4ee bg:#5c2347)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#6cb4ee bg:#5c2347)'

[nodejs]
symbol = "оЬШ"
format = '[ $symbol ($version) ](fg:#f5a9d0 bg:#3d1830)'

[rust]
symbol = "оЮ®"
format = '[ $symbol ($version) ](fg:#f5a9d0 bg:#3d1830)'

[golang]
symbol = "оШ¶"
format = '[ $symbol ($version) ](fg:#f5a9d0 bg:#3d1830)'

[php]
symbol = "оЬљ"
format = '[ $symbol ($version) ](fg:#f5a9d0 bg:#3d1830)'

[python]
symbol = "оЬЉ"
format = '[ $symbol ($version )(\($virtualenv\) )](fg:#f5a9d0 bg:#3d1830)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
format = '[ пАЧ $time ](fg:#f5a9d0 bg:#2d1424)'

[hostname]
ssh_only = true
ssh_symbol = ""
format = '[$hostname ](bg:#f5a9d0 fg:#2d1424)'

[character]
success_symbol = '[пАД](#f5a9d0)'
error_symbol = '[пАД](#5c2347)'
