# Generated: pony=fluttershy shape=block (regenerate via pony.sh)
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[ ʚɞ ](bg:#fde9a4 fg:#2d2418)$hostname \
$directory \
$git_branch$git_status \
$nodejs$rust$golang$php$python \
$time\
\n$character"""

[directory]
style = "fg:#3a2f1f bg:#d4b85a"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "

[git_branch]
symbol = ""
format = '[ $symbol $branch ](fg:#f4a8c8 bg:#4a3d28)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#f4a8c8 bg:#4a3d28)'

[nodejs]
symbol = ""
format = '[ $symbol ($version) ](fg:#fde9a4 bg:#3a2f1f)'

[rust]
symbol = ""
format = '[ $symbol ($version) ](fg:#fde9a4 bg:#3a2f1f)'

[golang]
symbol = ""
format = '[ $symbol ($version) ](fg:#fde9a4 bg:#3a2f1f)'

[php]
symbol = ""
format = '[ $symbol ($version) ](fg:#fde9a4 bg:#3a2f1f)'

[python]
symbol = ""
format = '[ $symbol ($version )(\($virtualenv\) )](fg:#fde9a4 bg:#3a2f1f)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
format = '[  $time ](fg:#f4a8c8 bg:#2d2418)'

[hostname]
ssh_only = true
ssh_symbol = ""
format = '[$hostname ](bg:#fde9a4 fg:#2d2418)'

[character]
success_symbol = '[ʚɞ](#fde9a4)'
error_symbol = '[ʚɞ](#4a3d28)'
