[time]
disabled = false
time_format = "%R"
format = '[ пҖ— $time ](fg:#f0a04b bg:#2a1810)'

[hostname]
ssh_only = true
ssh_symbol = ""
format = '[$hostname ](bg:#f0a04b fg:#2a1810)'

[character]
