"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](#f0a04b)[ п“ҳ ](bg:#f0a04b fg:#2a1810)$hostname[оӮҙ](fg:#f0a04b)\
 [оӮ¶](#d97706)$directory[оӮҙ](fg:#d97706)\
 [оӮ¶](#4a8c3a)$git_branch$git_status[оӮҙ](fg:#4a8c3a)\
 [оӮ¶](#4d2e1a)$nodejs$rust$golang$php$python[оӮҙ](fg:#4d2e1a)\
 [оӮ¶](#2a1810)$time[оӮҙ](fg:#2a1810)\
\n$character"""

[directory]
style = "fg:#fde8c8 bg:#d97706"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пҖӯ "
"Downloads" = "пҖҷ "

[git_branch]
symbol = "оӮ "
format = '[ $symbol $branch ](fg:#fde8c8 bg:#4a8c3a)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#fde8c8 bg:#4a8c3a)'

[nodejs]
symbol = "оңҳ"
format = '[ $symbol ($version) ](fg:#f0a04b bg:#4d2e1a)'

[rust]
symbol = "оһЁ"
format = '[ $symbol ($version) ](fg:#f0a04b bg:#4d2e1a)'

[golang]
symbol = "оҳҰ"
format = '[ $symbol ($version) ](fg:#f0a04b bg:#4d2e1a)'

[php]
symbol = "оңҪ"
format = '[ $symbol ($version) ](fg:#f0a04b bg:#4d2e1a)'

[python]
symbol = "оңј"
format = '[ $symbol ($version )(\($virtualenv\) )](fg:#f0a04b bg:#4d2e1a)'
