[directory]
style = "fg:#ffffff bg:#5dadec"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ÔÄ≠ "
"Downloads" = "ÔÄô "

[git_branch]
symbol = "Óā†"
format = '[ $symbol $branch ](fg:#0d1b2a bg:#ff6b6b)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#0d1b2a bg:#ff6b6b)'

[nodejs]
symbol = "Óúė"
format = '[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)'

[rust]
symbol = "Óě®"
format = '[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)'

[golang]
