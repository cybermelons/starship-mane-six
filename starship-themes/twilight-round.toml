# Generated: pony=twilight shape=round (regenerate via pony.sh)
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#b48ce8)\
[ пҖ… ](bg:#b48ce8 fg:#1a1033)\
$hostname\
[оӮҙ](bg:#6b3fa0 fg:#b48ce8)\
$directory\
[оӮҙ](fg:#6b3fa0 bg:#2d1b4e)\
$git_branch$git_status\
[оӮҙ](fg:#2d1b4e bg:#1a1033)\
$nodejs$rust$golang$php$python\
[оӮҙ](fg:#1a1033 bg:#0f0820)\
$time\
[оӮҙ](fg:#0f0820)\
\n$character"""

[directory]
style = "fg:#f5e6ff bg:#6b3fa0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пҖӯ "
"Downloads" = "пҖҷ "

[git_branch]
symbol = "оӮ "
format = '[ $symbol $branch ](fg:#f5a9d0 bg:#2d1b4e)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#f5a9d0 bg:#2d1b4e)'

[nodejs]
symbol = "оңҳ"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[rust]
symbol = "оһЁ"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[golang]
symbol = "оҳҰ"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[php]
symbol = "оңҪ"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[python]
symbol = "оңј"
format = '[ $symbol ($version )(\($virtualenv\) )](fg:#b48ce8 bg:#1a1033)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
format = '[ пҖ— $time ](fg:#d4b8f0 bg:#0f0820)'

[hostname]
ssh_only = true
ssh_symbol = ""
format = '[$hostname ](bg:#b48ce8 fg:#1a1033)'

[character]
success_symbol = '[пҖ…](#b48ce8)'
error_symbol = '[пҖ…](#2d1b4e)'
