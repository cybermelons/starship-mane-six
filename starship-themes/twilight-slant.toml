# Generated: pony=twilight shape=slant (regenerate via pony.sh)
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[вЦСвЦТвЦУ](#b48ce8)\
[ пАЕ ](bg:#b48ce8 fg:#1a1033)\
$hostname\
[оВЄ](bg:#6b3fa0 fg:#b48ce8)\
$directory\
[оВЄ](fg:#6b3fa0 bg:#2d1b4e)\
$git_branch$git_status\
[оВЄ](fg:#2d1b4e bg:#1a1033)\
$nodejs$rust$golang$php$python\
[оВЄ](fg:#1a1033 bg:#0f0820)\
$time\
[оВЄ](fg:#0f0820)\
\n$character"""

[directory]
style = "fg:#f5e6ff bg:#6b3fa0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "пА≠ "
"Downloads" = "пАЩ "

[git_branch]
symbol = "оВ†"
format = '[ $symbol $branch ](fg:#f5a9d0 bg:#2d1b4e)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#f5a9d0 bg:#2d1b4e)'

[nodejs]
symbol = "оЬШ"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[rust]
symbol = "оЮ®"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[golang]
symbol = "оШ¶"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[php]
symbol = "оЬљ"
format = '[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)'

[python]
symbol = "оЬЉ"
format = '[ $symbol ($version )(\($virtualenv\) )](fg:#b48ce8 bg:#1a1033)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
format = '[ пАЧ $time ](fg:#d4b8f0 bg:#0f0820)'

[hostname]
ssh_only = true
ssh_symbol = ""
format = '[$hostname ](bg:#b48ce8 fg:#1a1033)'

[character]
success_symbol = '[пАЕ](#b48ce8)'
error_symbol = '[пАЕ](#2d1b4e)'
