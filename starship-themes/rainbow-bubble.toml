# Generated: pony=rainbow shape=bubble (regenerate via pony.sh)
"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](#89cff0)[ пғ§ ](bg:#89cff0 fg:#0d1b2a)$hostname[оӮҙ](fg:#89cff0)\
 [оӮ¶](#5dadec)$directory[оӮҙ](fg:#5dadec)\
 [оӮ¶](#ff6b6b)$git_branch$git_status[оӮҙ](fg:#ff6b6b)\
 [оӮ¶](#ffd93d)$nodejs$rust$golang$php$python[оӮҙ](fg:#ffd93d)\
 [оӮ¶](#1b3a5c)$time[оӮҙ](fg:#1b3a5c)\
\n$character"""

[directory]
style = "fg:#ffffff bg:#5dadec"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "пҖӯ "
"Downloads" = "пҖҷ "

[git_branch]
symbol = "оӮ "
format = '[ $symbol $branch ](fg:#0d1b2a bg:#ff6b6b)'

[git_status]
format = '[($all_status$ahead_behind )](fg:#0d1b2a bg:#ff6b6b)'

[nodejs]
symbol = "оңҳ"
format = '[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)'

[rust]
symbol = "оһЁ"
format = '[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)'

[golang]
symbol = "оҳҰ"
format = '[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)'

[php]
symbol = "оңҪ"
format = '[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)'

[python]
symbol = "оңј"
format = '[ $symbol ($version )(\($virtualenv\) )](fg:#0d1b2a bg:#ffd93d)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
format = '[ пҖ— $time ](fg:#89cff0 bg:#1b3a5c)'

[hostname]
ssh_only = true
ssh_symbol = ""
format = '[$hostname ](bg:#89cff0 fg:#0d1b2a)'

[character]
success_symbol = '[пғ§](#89cff0)'
error_symbol = '[пғ§](#ff6b6b)'
