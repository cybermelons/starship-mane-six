"$schema" = 'https://starship.rs/config-schema.json'
# Rainbow Dash — cyan sky with rainbow segment streak

format = """
[░▒▓](#89cff0)\
[  ](bg:#89cff0 fg:#0d1b2a)\
[](bg:#5dadec fg:#89cff0)\
$directory\
[](fg:#5dadec bg:#ff6b6b)\
$git_branch\
$git_status\
[](fg:#ff6b6b bg:#ffa94d)\
$nodejs\
$bun\
[](fg:#ffa94d bg:#ffd93d)\
$rust\
$golang\
[](fg:#ffd93d bg:#6bcf7f)\
$php\
$python\
[](fg:#6bcf7f bg:#1b3a5c)\
$time\
[ ](fg:#1b3a5c)\
\n$character"""

[directory]
style = "fg:#ffffff bg:#5dadec"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#ff6b6b"
format = '[[ $symbol $branch ](fg:#0d1b2a bg:#ff6b6b)]($style)'

[git_status]
style = "bg:#ff6b6b"
format = '[[($all_status$ahead_behind )](fg:#0d1b2a bg:#ff6b6b)]($style)'

[nodejs]
symbol = ""
style = "bg:#ffa94d"
format = '[[ $symbol ($version) ](fg:#0d1b2a bg:#ffa94d)]($style)'

[bun]
symbol = ""
style = "bg:#ffa94d"
format = '[[ $symbol ($version) ](fg:#0d1b2a bg:#ffa94d)]($style)'

[rust]
symbol = ""
style = "bg:#ffd93d"
format = '[[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)]($style)'

[golang]
symbol = ""
style = "bg:#ffd93d"
format = '[[ $symbol ($version) ](fg:#0d1b2a bg:#ffd93d)]($style)'

[php]
symbol = ""
style = "bg:#6bcf7f"
format = '[[ $symbol ($version) ](fg:#0d1b2a bg:#6bcf7f)]($style)'

[python]
symbol = ""
style = "bg:#6bcf7f"
format = '[[ $symbol ($version )(\($virtualenv\) )](fg:#0d1b2a bg:#6bcf7f)]($style)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
style = "bg:#1b3a5c"
format = '[[  $time ](fg:#89cff0 bg:#1b3a5c)]($style)'

[character]
success_symbol = '[](#5dadec)'
error_symbol = '[](#ff6b6b)'
