"$schema" = 'https://starship.rs/config-schema.json'
# Twilight Sparkle — deep magic purple with a pink streak

format = """
[░▒▓](#b48ce8)\
[  ](bg:#b48ce8 fg:#1a1033)\
[](bg:#6b3fa0 fg:#b48ce8)\
$directory\
[](fg:#6b3fa0 bg:#2d1b4e)\
$git_branch\
$git_status\
[](fg:#2d1b4e bg:#1a1033)\
$nodejs\
$bun\
$rust\
$golang\
$php\
$python\
[](fg:#1a1033 bg:#0f0820)\
$time\
[ ](fg:#0f0820)\
\n$character"""

[directory]
style = "fg:#f5e6ff bg:#6b3fa0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:#2d1b4e"
format = '[[ $symbol $branch ](fg:#f5a9d0 bg:#2d1b4e)]($style)'

[git_status]
style = "bg:#2d1b4e"
format = '[[($all_status$ahead_behind )](fg:#f5a9d0 bg:#2d1b4e)]($style)'

[nodejs]
symbol = ""
style = "bg:#1a1033"
format = '[[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)]($style)'

[bun]
symbol = ""
style = "bg:#1a1033"
format = '[[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)]($style)'

[rust]
symbol = ""
style = "bg:#1a1033"
format = '[[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)]($style)'

[golang]
symbol = ""
style = "bg:#1a1033"
format = '[[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)]($style)'

[php]
symbol = ""
style = "bg:#1a1033"
format = '[[ $symbol ($version) ](fg:#b48ce8 bg:#1a1033)]($style)'

[python]
symbol = ""
style = "bg:#1a1033"
format = '[[ $symbol ($version )(\($virtualenv\) )](fg:#b48ce8 bg:#1a1033)]($style)'
python_binary = ["python", "python3"]

[time]
disabled = false
time_format = "%R"
style = "bg:#0f0820"
format = '[[  $time ](fg:#d4b8f0 bg:#0f0820)]($style)'

[character]
success_symbol = '[](#b48ce8)'
error_symbol = '[](#f5a9d0)'
